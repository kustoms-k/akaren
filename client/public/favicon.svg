<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Trailer -->
  <rect x="1.5" y="10" width="18" height="8.5" rx="1.5" fill="#1a1d24"/>
  <!-- Cab with angular windshield -->
  <path d="M18.5 18.5 L18.5 7 L22.5 7 L28.5 13.5 L28.5 18.5 Z" fill="#1a1d24"/>
  <!-- Rear wheel -->
  <circle cx="7" cy="21.5" r="3.5" fill="#1a1d24"/>
  <circle cx="7" cy="21.5" r="1.75" fill="white"/>
  <!-- Front wheel -->
  <circle cx="24" cy="21.5" r="3.5" fill="#1a1d24"/>
  <circle cx="24" cy="21.5" r="1.75" fill="white"/>
  <!-- Origin dot -->
  <circle cx="2" cy="28" r="1.75" fill="#1a1d24"/>
  <!-- Route line -->
  <path d="M2 28 L24.5 28" stroke="#1a1d24" stroke-width="1.75" stroke-linecap="round"/>
  <!-- Forward chevron -->
  <path d="M22 25.5 L25.5 28 L22 30.5" stroke="#1a1d24" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Destination dot -->
  <circle cx="28.5" cy="28" r="1.75" fill="#1a1d24"/>
</svg>
